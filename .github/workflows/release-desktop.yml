name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_command: npm run dist:win
            artifact_name: windows-installer
            artifact_glob: dist/*.exe
          - os: macos-latest
            build_command: npm run dist:mac
            artifact_name: mac-dmg
            artifact_glob: dist/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build desktop package
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
          body: |
            Téléchargements utiles :
            - Windows : téléchargez le fichier `.exe`
            - Mac Apple Silicon (M1, M2, M3, etc.) : téléchargez le fichier `.dmg` contenant `mac-arm64`
            - Mac Intel : téléchargez le fichier `.dmg` contenant `mac-x64`

            Fichiers à ignorer :
            - `Source code (zip)`
            - `Source code (tar.gz)`

            Cette release ne publie que les fichiers nécessaires pour jouer.
